<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>모임 일정</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="name-modal" id="authGate" aria-label="로그인">
    <div class="name-card">
      <div class="browser-warning is-hidden" id="kakaoBrowserWarning">
        <p>Google 로그인은 카카오톡 브라우저에서 제한됩니다. 크롬으로 열어주세요.</p>
      </div>
      <div class="auth-mode" id="adminLoginPanel">
        <h2>관리자 로그인</h2>
        <button class="primary-button" type="button" id="googleLoginBtn">Google로 로그인</button>
      </div>
      <div class="auth-mode is-hidden" id="participantNamePanel">
        <h2>참여자 이름</h2>
        <input type="text" id="participantNameInput" placeholder="이름을 입력해주세요" autocomplete="name" />
        <button class="primary-button" type="button" id="participantStartBtn">일정 선택 시작하기</button>
      </div>
      <p class="auth-error" id="authError"></p>
    </div>
  </div>

  <div class="app-shell is-hidden" id="appShell">
    <header class="topbar">
      <div class="brand">
        <span class="brand-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24"><path d="M16 11c1.66 0 3-1.57 3-3.5S17.66 4 16 4s-3 1.57-3 3.5S14.34 11 16 11Zm-8 0c1.66 0 3-1.57 3-3.5S9.66 4 8 4 5 5.57 5 7.5 6.34 11 8 11Zm0 2c-2.67 0-5 1.34-5 3v2h10v-2c0-1.66-2.33-3-5-3Zm8 0c-.38 0-.75.03-1.1.09 1.3.75 2.1 1.78 2.1 2.91v2h4v-2c0-1.66-2.33-3-5-3Z"/></svg>
        </span>
        <span id="brandTitle">모임 일정</span>
      </div>
      <div class="top-actions">
        <button class="ghost-button" type="button" id="myPageBtn">마이페이지</button>
        <div class="signed-user" id="signedUserName">사용자</div>
        <button class="ghost-button" type="button" id="logoutBtn">로그아웃</button>
        <div class="attendee-count" id="attendeeCount">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M16 11c1.66 0 3-1.57 3-3.5S17.66 4 16 4s-3 1.57-3 3.5S14.34 11 16 11ZM8 11c1.66 0 3-1.57 3-3.5S9.66 4 8 4 5 5.57 5 7.5 6.34 11 8 11Zm0 2c-2.67 0-5 1.34-5 3v2h10v-2c0-1.66-2.33-3-5-3Zm8 0c-.38 0-.75.03-1.1.09 1.3.75 2.1 1.78 2.1 2.91v2h4v-2c0-1.66-2.33-3-5-3Z"/></svg>
          참여자 1
        </div>
        <div class="profile-avatar" id="profileAvatar" aria-label="내 프로필">?</div>
      </div>
    </header>

    <main class="mypage-view" id="myPageView">
      <section class="results-card my-page" id="myPage" aria-labelledby="myPageTitle">
        <h2 id="myPageTitle">마이페이지</h2>
        <p><strong id="myPageName">사용자</strong></p>
        <p class="empty-text" id="myPageEmail"></p>

        <div class="mypage-actions">
          <button class="primary-button" type="button" id="createRoomBtn">새 모임 만들기</button>
          <button class="secondary-button is-hidden" type="button" id="addRoomBtn">모임 추가하기</button>
        </div>

        <div class="room-list-block">
          <h3>내 모임 목록</h3>
          <div class="room-list" id="roomList">
            <p class="empty-text">아직 만든 모임이 없어요.</p>
          </div>
        </div>
      </section>
    </main>

    <main class="workspace is-hidden" id="schedulerView">
      <section class="calendar-panel" aria-labelledby="calendarTitle">
        <div class="month-header">
          <button class="icon-button" type="button" id="prevMonthBtn" aria-label="이전 달">
            <svg viewBox="0 0 24 24"><path d="m15.41 7.41-1.42-1.41L8 12l5.99 6 1.42-1.41L10.83 12l4.58-4.59Z"/></svg>
          </button>
          <h1 id="calendarTitle">달력</h1>
          <button class="icon-button" type="button" id="nextMonthBtn" aria-label="다음 달">
            <svg viewBox="0 0 24 24"><path d="m8.59 16.59 1.42 1.41L16 12 10.01 6 8.59 7.41 13.17 12l-4.58 4.59Z"/></svg>
          </button>
        </div>
        <div class="scheduler-actions">
          <button class="ghost-button" type="button" id="copyLinkBtn">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M10.59 13.41a1.996 1.996 0 0 0 2.82 0l3.59-3.59a2 2 0 0 0-2.83-2.83l-.88.88-1.41-1.41.88-.88a4 4 0 0 1 5.66 5.66l-3.59 3.59a4 4 0 0 1-5.66 0l1.42-1.42Zm2.82-2.82a1.996 1.996 0 0 0-2.82 0L7 14.18a2 2 0 1 0 2.83 2.83l.88-.88 1.41 1.41-.88.88a4 4 0 0 1-5.66-5.66l3.59-3.59a4 4 0 0 1 5.66 0l-1.42 1.42Z"/></svg>
            초대 링크 복사
          </button>
        </div>

        <div class="weekday-row" aria-hidden="true">
          <span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span>
        </div>
        <div class="calendar-grid" id="calendarGrid" aria-label="월별 달력"></div>

        <div class="legend" aria-label="선택 인원 범례">
          <span><i class="level-none"></i>0명</span>
          <span><i class="level-one"></i>1명</span>
          <span><i class="level-two"></i>2~3명</span>
          <span><i class="level-all"></i>4명 이상</span>
        </div>

        <section class="results-card" aria-labelledby="mySelectionTitle">
          <h2 id="mySelectionTitle">내 선택 결과</h2>
          <div class="my-selection-list" id="mySelectionList">
            <p class="empty-text">아직 저장된 선택 결과가 없어요.</p>
          </div>
        </section>
      </section>

      <aside class="summary-panel" aria-labelledby="summaryTitle">
        <div class="summary-date">
          <p>현재 선택 중</p>
          <h2 id="summaryTitle">날짜를 선택해주세요</h2>
        </div>

        <div class="selected-times">
          <h3>선택한 시간</h3>
          <div class="time-chip-row" id="selectedTimes">
            <span class="empty-text">시간을 선택하면 여기에 표시돼요.</span>
          </div>
        </div>

        <div class="preview-count">
          <h3>참여 인원</h3>
          <strong id="previewParticipantCount">0명</strong>
        </div>
      </aside>
    </main>
  </div>

  <div class="modal-backdrop" id="timeModal" aria-hidden="true">
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <button class="modal-close" type="button" id="closeModalBtn" aria-label="닫기">
        <svg viewBox="0 0 24 24"><path d="m18.3 5.71-1.41-1.42L12 9.17 7.11 4.29 5.7 5.71 10.59 10.6 5.7 15.49l1.41 1.41L12 12.01l4.89 4.89 1.41-1.41-4.89-4.89 4.89-4.89Z"/></svg>
      </button>
      <p class="modal-label">날짜 선택</p>
      <h2 id="modalTitle">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 2h2v2h6V2h2v2h3v18H4V4h3V2Zm13 8H6v10h14V10ZM6 8h14V6H6v2Z"/></svg>
        <span id="modalDate">날짜를 선택해주세요</span>
      </h2>
      <div class="modal-scroll-area">
        <p class="time-helper">시간 선택 (복수 선택 가능)</p>
        <div class="time-grid" id="timeGrid"></div>
      </div>
      <div class="modal-actions">
        <button class="secondary-button" type="button" id="cancelBtn">취소</button>
        <button class="primary-button" type="button" id="saveBtn">저장</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast">초대 링크를 복사했어요</div>

  <script type="module" src="script.js"></script>
</body>
</html>
